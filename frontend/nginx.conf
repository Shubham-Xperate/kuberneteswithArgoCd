server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Angular client-side routing fallback: any path that doesn't match a
    # real static file falls back to index.html so the Angular Router can
    # handle it (e.g. a hard refresh on /products/3 or /orders).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for the backend API.
    #
    # "ecommerce-api:8080" is NOT a public hostname - it is the in-cluster
    # Kubernetes Service DNS name + port that the backend is reachable at,
    # resolved via Kubernetes' internal cluster DNS (CoreDNS). This proxy_pass
    # only works when this nginx container is running as a Pod inside the
    # same Kubernetes cluster/namespace as a Service literally named
    # "ecommerce-api" listening on port 8080. In local docker-compose or
    # other environments, this hostname would need to be adjusted (e.g. via
    # a different nginx.conf mounted in, or a compose service alias).
    location /api/ {
        proxy_pass http://ecommerce-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
