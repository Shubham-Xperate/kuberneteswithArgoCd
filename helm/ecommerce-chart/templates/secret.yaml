{{/*
secret.yaml

NOT explicitly required by the original raw-manifest checklist (k8s/base
ships a secret.EXAMPLE.yaml template you apply manually via kubectl create),
but the Helm chart's values.yaml exposes a `secrets.create` toggle that would
otherwise do nothing -- so this template exists to make that toggle
meaningful for a self-contained `helm install`.

When `secrets.create: false`, this template renders NOTHING, and the chart
assumes Secrets named `secrets.dbSecretName` / `secrets.apiSecretName`
already exist in the target namespace -- created by `kubectl create secret`,
by an external-secrets/Key Vault-CSI-driven SecretProviderClass, or by
whatever the platform team's process is. This is the recommended mode for
production (see the long comment in values.yaml's `secrets:` block).

When true (the default, for local/dev convenience), we template Secrets
directly from values -- which only ever hold placeholder text unless YOU
override them via --set or a git-ignored values-secrets.yaml at install
time. Never edit real credentials into values.yaml/values-dev.yaml/
values-prod.yaml directly, since those are meant to be committed to git.
*/}}
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.dbSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecommerce-chart.labels" . | nindent 4 }}
type: Opaque
stringData:
  sa-password: {{ .Values.secrets.dbPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.apiSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecommerce-chart.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-key: {{ .Values.secrets.jwtKey | quote }}
  # Built here (rather than stored as one opaque string in values.yaml) so
  # the SQL host/port/db name automatically stay correct if you ever rename
  # the sql-service or change the DB name, and so dev vs prod can each
  # compose their own connection string from smaller, individually
  # overridable pieces.
  connection-string: {{ printf "Server=%s-sql,1433;Database=EcommerceDb;User Id=sa;Password=%s;TrustServerCertificate=True;" (include "ecommerce-chart.fullname" .) .Values.secrets.dbPassword | quote }}
{{- end }}
