# api-deployment.yaml
#
# NOTE (divergence from k8s/base/api-deployment.yaml): base hardcodes
# `namespace: ecommerce` and a static resource name; here we use
# .Release.Namespace and the `include "ecommerce-chart.fullname"` helper so
# multiple releases of this chart never collide. Probe paths, security
# context, and the readiness-vs-liveness split are otherwise identical in
# spirit to k8s/base -- re-read the comments there for the full rationale;
# comments here focus on what's DIFFERENT because it's templated.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecommerce-chart.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ecommerce-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "ecommerce-chart.componentSelectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ecommerce-chart.componentSelectorLabels" (dict "context" . "component" "api") | nindent 8 }}
    spec:
      # runAsNonRoot: true -- same defense-in-depth reasoning as k8s/base:
      # refuse to start the container at all if the image would otherwise
      # run as root, so a compromised process can never leverage root
      # inside the container as a stepping stone to a node/cluster breakout.
      securityContext:
        runAsNonRoot: true
        # Matches the numeric UID/GID the image's appuser is created with
        # (backend/Dockerfile).
        runAsUser: 999
        runAsGroup: 999
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "ecommerce-chart.fullname" . }}-config
          env:
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiSecretName }}
                  key: jwt-key
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.apiSecretName }}
                  key: connection-string
          # `toYaml | nindent` is the standard Helm idiom for dropping an
          # arbitrarily-shaped map (here: the requests/limits sub-tree)
          # straight from values.yaml into the template with correct
          # indentation, instead of hand-writing every possible sub-field
          # (cpu/memory/ephemeral-storage/...) as its own template line.
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          # READINESS: checks DB connectivity too -- pulls this pod out of
          # the Service's endpoints if the DB is unreachable, WITHOUT
          # restarting the pod (restarting fixes nothing if the DB is down).
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # LIVENESS: process-only, no DB check -- restarts a genuinely
          # wedged process, but must never restart just because a downstream
          # dependency is having a bad day.
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
