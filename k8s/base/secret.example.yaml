# =============================================================================
# secret.example.yaml  --  TEMPLATE ONLY. DO NOT APPLY THIS FILE AS-IS.
# =============================================================================
#
# !!! WARNING - READ BEFORE YOU DO ANYTHING WITH THIS FILE !!!
#
#   This file exists PURELY as a documented example of the shape of the two
#   Secrets this app needs. The values below are obvious, useless placeholders.
#
#   NEVER commit a real version of this file (with real passwords/keys) to git.
#   If you rename this to `secret.yaml` and fill in real values, add that exact
#   filename to `.gitignore` immediately.
#
#   In this lab, create the REAL secrets imperatively instead, e.g.:
#
#     kubectl create secret generic ecommerce-db-secret \
#       --namespace ecommerce \
#       --from-literal=sa-password='Your_Str0ng_P@ssw0rd!' \
#       --dry-run=client -o yaml | kubectl apply -f -
#
#     kubectl create secret generic ecommerce-api-secret \
#       --namespace ecommerce \
#       --from-literal=jwt-key='a-long-random-signing-key-at-least-32-bytes' \
#       --from-literal=connection-string='Server=sqlserver,1433;Database=EcommerceDb;User Id=sa;Password=Your_Str0ng_P@ssw0rd!;TrustServerCertificate=True;' \
#       --dry-run=client -o yaml | kubectl apply -f -
#
#   PRODUCTION (AKS): Secrets should NOT be created by hand at all. The
#   companion Terraform (owned by the infra/platform agent in this project)
#   already provisions AKS with an AAD Workload Identity / Managed Identity
#   attached to the cluster's OIDC issuer specifically so that the
#   "Secrets Store CSI Driver" (Azure Key Vault provider) can mount secrets
#   from Azure Key Vault directly into pods as files/env vars, with no
#   Kubernetes Secret ever containing the plaintext at rest (or optionally
#   the CSI driver can sync into a native k8s Secret for consumption by
#   env-based apps like this one, which still keeps the source of truth in
#   Key Vault with full audit logging and rotation). See:
#   https://learn.microsoft.com/azure/aks/csi-secrets-store-driver
#
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-db-secret
  namespace: ecommerce
  labels:
    app.kubernetes.io/name: ecommerce-db-secret
    app.kubernetes.io/part-of: ecommerce-devops-lab
# `type: Opaque` = "unstructured key/value data", the generic Secret type.
# Other types (kubernetes.io/tls, kubernetes.io/dockerconfigjson, ...) add
# validation for specific well-known shapes; we don't need that here.
type: Opaque
stringData:
  # SQL Server requires the SA password to satisfy complexity rules
  # (upper+lower+digit+symbol, 8+ chars) or the container entrypoint will
  # refuse to start. This is consumed by sql-statefulset.yaml as the
  # MSSQL_SA_PASSWORD env var, and by the API's connection string.
  # stringData (vs. `data`) lets us write plaintext here and kubectl/etcd
  # handles the base64 encoding for us -- this file is a TEMPLATE, so
  # plaintext-looking placeholders are intentional and fine to read.
  sa-password: "CHANGE_ME_Str0ngP@ssw0rd!"
---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-api-secret
  namespace: ecommerce
  labels:
    app.kubernetes.io/name: ecommerce-api-secret
    app.kubernetes.io/part-of: ecommerce-devops-lab
type: Opaque
stringData:
  # Symmetric signing key ASP.NET Core uses to sign/validate JWT access
  # tokens (Jwt:Key in appsettings, read via env var Jwt__Key -- the double
  # underscore is ASP.NET Core's convention for mapping env vars to nested
  # config sections). Must be long/random; rotating it invalidates all
  # existing tokens, so treat rotation like a mini incident.
  jwt-key: "CHANGE_ME_use_a_long_random_32+_byte_string"
  # Full ADO.NET connection string for the API's DbContext. Kept as a secret
  # (not a ConfigMap) because it embeds credentials. Points at the in-cluster
  # `sqlserver` headless Service by DNS name for local dev.
  connection-string: "Server=sqlserver,1433;Database=EcommerceDb;User Id=sa;Password=CHANGE_ME_Str0ngP@ssw0rd!;TrustServerCertificate=True;"
