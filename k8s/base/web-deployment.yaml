# =============================================================================
# web-deployment.yaml -- Angular app served by nginx
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-web
  namespace: ecommerce
  labels:
    app.kubernetes.io/name: ecommerce-web
    app.kubernetes.io/part-of: ecommerce-devops-lab
spec:
  replicas: 2 # base default; dev overlay -> 1, prod overlay -> 3 (see overlays/)
  selector:
    matchLabels:
      app.kubernetes.io/name: ecommerce-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ecommerce-web
    spec:
      # nginx's official/community images run fine as non-root when using the
      # "unprivileged" variant (listens on 8080 internally) or the standard
      # image configured to drop privileges; either way this app's image is
      # expected to already run as a non-root user, so we enforce it here too
      # for the same defense-in-depth reasoning as the API pod.
      securityContext:
        runAsNonRoot: true
        # Matches the built-in non-root "nginx" user in the
        # nginxinc/nginx-unprivileged base image (frontend/Dockerfile).
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: web
          image: youracr.azurecr.io/ecommerce-web:latest
          ports:
            - containerPort: 8080
              name: http
          # The image's docker-entrypoint.sh reads API_URL at container start
          # and regenerates assets/env.js from it (a small runtime-config
          # file the Angular app fetches and reads before bootstrapping).
          # This is what lets ONE built container image be deployed
          # unchanged across dev/staging/prod even though each points at a
          # different API path/host -- we inject config at start time
          # instead of baking it into the JS bundle at build time.
          env:
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-config
                  key: API_URL
          # nginx serving static files + proxying is cheap; small footprint
          # is realistic and keeps more room on the node for the API/DB.
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          # For a static-file server, readiness and liveness collapse to
          # basically the same check (nginx has no external dependency like a
          # DB to distinguish them by) -- both just confirm the nginx master
          # process is accepting connections and serving the root document.
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
