# kind-config.yaml
#
# Local-only dev helper: NOT part of the app itself, and not used by
# kustomize/helm. Passed to `kind create cluster --config k8s/kind-config.yaml`
# so the kind node container maps host ports 80/443 into itself at
# creation time -- Docker only allows declaring port mappings when a
# container is created, so this can't be added to an already-running
# cluster; the cluster has to be created with this file from the start.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    # Marks this node so the ingress-nginx controller's nodeSelector
    # (in its kind-specific install manifest) knows it's allowed to
    # schedule the controller pod here.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # Host ports 80/443 are taken by IIS on this machine, so we map to
    # 8080/8443 instead -- app is reached at http://ecommerce.local:8080.
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
